name: Continuous Integration

on:
  push:
    branches:
      - main
      - english
  pull_request:
    branches:
      - main
      - english

jobs:
  # ── LINT & STYLE CHECKS ───────────────────────────────
  lint:
    name: Code Quality & Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-node: '3.11'
          cache: 'pip'

      - name: Install Linting dependencies
        run: |
          python -m pip upgrade pip
          pip install flake8 black isort

      - name: Run Flake8 Code Inspection
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ── UNIT & SECURITY TESTS RUNNERS ──────────────────────
  test:
    name: Python Test Suite & hardeners
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r req.txt
          pip install coverage pytest pytest-cov

      - name: Run 35 Unit and Security Tests
        run: |
          # Execute the complete unit test discovery with coverage
          python -m coverage run -m unittest discover -s tests -p "test_*.py"
          python -m coverage report -m

      - name: Upload Test Coverage Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: test-coverage-report
          path: .coverage
