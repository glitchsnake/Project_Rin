name: Continuous Delivery & Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # ── BUILD & PUBLISH TO GHCR ───────────────────────────
  build-and-publish:
    name: Build & Distribute Multi-Platform Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up QEMU to allow multi-architecture builds (AMD64 & ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login to GitHub Packages Container Registry (GHCR)
      - name: Authenticate to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract repository name as lowercase for GHCR naming compliance
      - name: Extract metadata tags for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=short

      # Build and push the production image to GHCR
      - name: Build and Push Production Image
        uses: docker/build-push-action@v4
        with:
          context: .
          dockerfile: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── STAGING / VPS DEPLOYMENT STAGE (EXAMPLE) ───────────
  deploy:
    name: Continuous Deployment to Host (Staging)
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Image Hook Execution
        run: |
          echo "🚀 Initiating remote VPS deployment steps..."
          echo "To automate remote deployment, configure SSH connection and execute:"
          echo "ssh user@vps-ip 'cd /app && docker compose pull && docker compose up -d'"
